<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dachshund Dash</title>
    <link rel="icon" type="image/png" href="assets/favicon.png">
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #87CEEB;
            font-family: 'Comic Sans MS', 'Chalkboard SE', sans-serif;
        }

        canvas {
            display: block;
        }

        #ui {
            pointer-events: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: 20px;
        }

        #title {
            margin: 0;
            padding: 10px 20px;
            font-family: 'Comic Sans MS', 'Arial Rounded MT Bold', sans-serif;
            font-size: 3rem;
            color: #FFD700;
            text-shadow: 3px 3px 0px #8B4513, 5px 5px 15px rgba(0, 0, 0, 0.5);
            background: rgba(0, 0, 0, 0.3);
            border-radius: 20px;
            pointer-events: auto;
        }

        #score-display,
        #time-display {
            font-size: 1.5rem;
            color: white;
            font-family: sans-serif;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.8);
            margin-top: 5px;
        }

        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 20px;
            box-sizing: border-box;
            color: white;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
        }

        #audio-controls {
            position: absolute;
            top: 20px;
            right: 20px;
            pointer-events: auto;
            display: flex;
            gap: 10px;
        }

        .toggle-btn {
            background: rgba(0, 0, 0, 0.6);
            color: white;
            border: 2px solid white;
            padding: 8px 15px;
            border-radius: 20px;
            cursor: pointer;
            font-family: sans-serif;
            font-weight: bold;
            transition: all 0.2s;
            font-size: 14px;
        }

        .toggle-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .toggle-btn.off {
            border-color: #ff6b6b;
            color: #ff6b6b;
        }

        .header {
            display: flex;
            justify-content: space-between;
            font-size: 24px;
            font-weight: bold;
        }

        #score-display {
            color: #FFDF00;
        }

        #time-display {
            color: #FF6B6B;
        }

        .instructions {
            text-align: center;
            font-size: 18px;
            background: rgba(0, 0, 0, 0.6);
            padding: 15px 30px;
            border-radius: 50px;
            align-self: center;
            margin-bottom: 30px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
        }

        #game-over {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(255, 255, 255, 0.9);
            color: #333;
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            display: none;
            pointer-events: auto;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
        }

        #game-over h1 {
            margin-top: 0;
            color: #FF6B6B;
            font-size: 48px;
        }

        #game-over button {
            background: #4CAF50;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 20px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            font-family: inherit;
            margin-top: 20px;
        }

        #game-over button:hover {
            background: #45a049;
        }

        /* Splash Screen */
        #audio-start-hint {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, #2c3e50 0%, #000000 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10000;
            cursor: pointer;
            transition: opacity 0.8s ease;
        }

        #splash-image {
            width: 90%;
            max-width: 600px;
            border-radius: 40px;
            border: 10px solid #FFD700;
            box-shadow: 0 0 60px rgba(255, 215, 0, 0.3);
            margin-bottom: 30px;
            transition: transform 0.3s ease;
        }

        #splash-image:hover {
            transform: scale(1.02);
        }

        #start-prompt {
            color: #FFD700;
            font-size: 2.8rem;
            font-weight: bold;
            font-family: 'Comic Sans MS', cursive, sans-serif;
            text-shadow: 4px 4px 8px rgba(0, 0, 0, 0.9);
            text-align: center;
            animation: pulse 2s infinite ease-in-out;
        }

        @keyframes pulse {
            0% {
                transform: scale(1);
                filter: brightness(1);
            }

            50% {
                transform: scale(1.1);
                filter: brightness(1.3);
            }

            100% {
                transform: scale(1);
                filter: brightness(1);
            }
        }

        /* Bark effect overlay */
        #bark-effect {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            box-shadow: inset 0 0 0 0px rgba(255, 255, 255, 0.8);
            transition: box-shadow 0.1s ease-out;
            pointer-events: none;
        }

        .barking {
            box-shadow: inset 0 0 50px 20px rgba(255, 255, 255, 0.8) !important;
        }

        /* Mobile Controls */
        #mobile-controls {
            display: none;
            position: absolute;
            bottom: 30px;
            width: 100%;
            pointer-events: none;
            justify-content: space-between;
            padding: 0 30px;
            box-sizing: border-box;
            z-index: 1000;
        }

        .mobile-btn {
            width: 80px;
            height: 80px;
            background: rgba(255, 255, 255, 0.2);
            border: 3px solid rgba(255, 255, 255, 0.8);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            color: white;
            pointer-events: auto;
            user-select: none;
            -webkit-user-select: none;
            touch-action: manipulation;
        }

        .mobile-btn:active {
            background: rgba(255, 255, 255, 0.5);
            transform: scale(0.9);
        }

        #mobile-joystick {
            display: flex;
            flex-direction: column;
            gap: 15px;
            align-items: center;
        }

        .joystick-row {
            display: flex;
            gap: 15px;
        }

        @media (max-width: 1024px),
        (pointer: coarse) {
            #mobile-controls {
                display: flex;
            }

            .instructions {
                display: none;
                /* Hide keyboard instructions on mobile */
            }

            #title {
                font-size: 2rem;
            }
        }
    </style>
</head>

<body>
    <div id="bark-effect"></div>
    <div id="mobile-controls">
        <div id="mobile-joystick">
            <div id="btn-up" class="mobile-btn">▲</div>
            <div class="joystick-row">
                <div id="btn-left" class="mobile-btn">◀</div>
                <div id="btn-right" class="mobile-btn">▶</div>
            </div>
        </div>
        <div id="btn-dash" class="mobile-btn"
            style="width: 120px; height: 120px; background: rgba(255, 107, 107, 0.4); border-color: #FF6B6B;">BARK!
        </div>
    </div>
    <div id="ui-layer">
        <div id="audio-controls">
            <button id="music-toggle" class="toggle-btn">Music: ON 🎵</button>
            <button id="sfx-toggle" class="toggle-btn">SFX: ON 🔊</button>
        </div>
        <div id="ui">
            <h1 id="title">Dachshund Dash! 🐾</h1>
            <div id="score-display">Score: 0</div>
            <div id="time-display">Time: 2:00</div>
        </div>
        <div class="instructions">
            <b>WASD</b>: Move | <b>Spacebar/Right-Click</b>: Bark & Dash | <b>Mouse</b>: Steer | <b>C</b>: Toggle Camera
        </div>
    </div>

    <div id="game-over">
        <h1>Time's Up!</h1>
        <h2 id="final-score">You caught 0 rabbits!</h2>
        <button onclick="location.reload()">Play Again</button>
    </div>

    <!-- Import maps polyfill -->
    <script async src="https://unpkg.com/es-module-shims@1.8.0/dist/es-module-shims.js"></script>

    <!-- Import map for Three.js -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module" src="js/main.js"></script>
</body>

</html>
